<style>
    html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px; /* Offset for fixed header */
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
    
    /* Hide scrollbar for Chrome, Safari and Opera */
    ::-webkit-scrollbar {
        display: none;
    }

    body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: transparent;
        color: #f8fafc;
        overflow-x: hidden;
    }
    h1, h2, h3, .font-heading {
        font-family: 'Syncopate', sans-serif;
    }

    :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.05);
        --glow-color: rgba(14, 165, 233, 0.15);
    }
    .dark {
        --glass-bg: rgba(15, 23, 42, 0.4);
        --glass-border: rgba(255, 255, 255, 0.05);
        --glow-color: rgba(14, 165, 233, 0.1);
    }

    .glassmorphic-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }

    .glassmorphic-sidebar {
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border-right: 1px solid var(--glass-border);
    }

    .glassmorphic-input {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--glass-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glassmorphic-input:focus {
        background: rgba(255, 255, 255, 0.05);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
    }

    /* Aurora Background */
    .aurora-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: #050b14;
        background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        overflow: hidden;
    }
    .aurora-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(2, 6, 23, 0.85); /* Dark overlay to ensure text readability and hide background text */
        backdrop-filter: blur(20px); /* Blur to hide any text in the background image */
    }
    .aurora-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.15;
        pointer-events: none;
    }

    /* Animations */
    @keyframes slide-up {
        from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px var(--glow-color); }
        50% { box-shadow: 0 0 40px var(--glow-color); }
    }
    .glow-pulse { animation: pulse-glow 4s infinite ease-in-out; }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
</style>
